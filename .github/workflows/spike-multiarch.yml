name: Spike A (multi-arch putup cross-build)

# Go/no-go spike for the CMake/vcxproj -> putup release migration: prove the
# clang-cl+xwin cross-build works for x86 (Win32) and ARM64, not just x86_64.
# Builds the risk-representative set per arch (ttermpro.exe pulls in the core;
# ttxssh.dll pulls in LibreSSL/argon2/oniguruma/zlib -- the asm/SIMD paths most
# likely to break off-x86_64; ttunittest.exe gives a runtime check), verifies the
# PE machine, and runs ttunittest on native ARM64 + x86-under-WOW64.
# Disposable: delete this workflow once the multi-arch build is folded into the
# real release lane.

on:
  workflow_dispatch:
  push:
    branches: [feature/putup-multiarch-spike]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            config: configs/xwin.config
            xwin_arch: x86_64
            machine: IMAGE_FILE_MACHINE_AMD64
          - arch: x86
            config: configs/win32-x86.config
            xwin_arch: x86
            machine: IMAGE_FILE_MACHINE_I386
          - arch: aarch64
            config: configs/arm64.config
            xwin_arch: aarch64
            machine: IMAGE_FILE_MACHINE_ARM64
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM toolchain (clang-cl, lld-link, llvm-lib, llvm-rc, llvm-readobj)
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld llvm
          for t in clang-cl lld-link llvm-lib llvm-rc llvm-readobj; do
            sudo ln -sf "$(ls /usr/bin/$t-* | sort -V | tail -1)" /usr/local/bin/$t
          done

      - name: Install putup
        run: |
          curl -fsSL https://raw.githubusercontent.com/typeless/putup/main/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Cache xwin splat (${{ matrix.xwin_arch }})
        id: cache-xwin
        uses: actions/cache@v4
        with:
          path: ~/.xwin/splat
          key: xwin-splat-0.9.0-${{ matrix.xwin_arch }}

      - name: Fetch MSVC CRT + Windows SDK (xwin, ${{ matrix.xwin_arch }})
        if: steps.cache-xwin.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://github.com/Jake-Shadle/xwin/releases/download/0.9.0/xwin-0.9.0-x86_64-unknown-linux-musl.tar.gz | tar -xz
          ./xwin-*/xwin --accept-license --arch ${{ matrix.xwin_arch }} splat --output "$HOME/.xwin/splat"

      - name: Cache vendored third-party sources
        id: cache-libs
        uses: actions/cache@v4
        with:
          path: |
            libs/oniguruma
            libs/SFMT
            libs/zlib
            libs/libressl
            libs/argon2
            libs/cJSON
          key: vendor-libs-${{ hashFiles('.github/workflows/putup.yml') }}

      - name: Restore tracked libs files after cache
        run: git checkout -- libs

      - name: Vendor third-party sources
        if: steps.cache-libs.outputs.cache-hit != 'true'
        run: |
          set -eux
          tmp="$(mktemp -d)"
          get() { curl -fsSL "$1" -o "$tmp/$2"; }
          merge() { mkdir -p "libs/$2" && cp -a "$tmp/$1/." "libs/$2/"; }
          get https://github.com/kkos/oniguruma/releases/download/v6.9.10/onig-6.9.10.tar.gz onig.tgz
          tar -xzf "$tmp/onig.tgz" -C "$tmp"; merge onig-6.9.10 oniguruma
          get https://github.com/MersenneTwister-Lab/SFMT/archive/refs/tags/1.5.1.tar.gz sfmt.tgz
          tar -xzf "$tmp/sfmt.tgz" -C "$tmp"; merge SFMT-1.5.1 SFMT
          get https://github.com/madler/zlib/archive/refs/tags/v1.3.2.tar.gz zlib.tgz
          tar -xzf "$tmp/zlib.tgz" -C "$tmp"; merge zlib-1.3.2 zlib
          get https://github.com/libressl/portable/releases/download/v4.2.1/libressl-4.2.1.tar.gz libressl.tgz
          tar -xzf "$tmp/libressl.tgz" -C "$tmp"; merge libressl-4.2.1 libressl
          get https://github.com/P-H-C/phc-winner-argon2/archive/refs/tags/20190702.tar.gz argon2.tgz
          tar -xzf "$tmp/argon2.tgz" -C "$tmp"; merge phc-winner-argon2-20190702 argon2
          get https://github.com/DaveGamble/cJSON/archive/v1.7.14.zip cjson.zip
          unzip -q "$tmp/cjson.zip" -d "$tmp"; merge cJSON-1.7.14 cJSON
          rm -rf "$tmp"

      - name: Build ${{ matrix.arch }} (whole product cross-compile)
        run: |
          set -eux
          export XWIN_SPLAT="$HOME/.xwin/splat"
          B="build-${{ matrix.arch }}"
          putup configure --config ${{ matrix.config }} -B "$B"
          # Full build (scans all Tupfiles then builds); a fresh build dir has no
          # scanned target graph yet, so target-by-path fails until this runs. The
          # second pass converges cold-build lib dep ordering (see putup.yml).
          putup -B "$B" || putup -B "$B"

      - name: Verify PE machine == ${{ matrix.machine }}
        run: |
          set -eux
          B="build-${{ matrix.arch }}"
          for bin in "$B/teraterm/teraterm/ttermpro.exe" "$B/ttssh2/ttxssh/ttxssh.dll" "$B/tests/unit/ttunittest.exe"; do
            llvm-readobj --file-headers "$bin" | grep -q "${{ matrix.machine }}"
            echo "OK: $bin is ${{ matrix.machine }}"
          done

      - name: Upload ${{ matrix.arch }} binaries
        uses: actions/upload-artifact@v4
        with:
          name: spike-${{ matrix.arch }}
          path: |
            build-${{ matrix.arch }}/teraterm/teraterm/ttermpro.exe
            build-${{ matrix.arch }}/ttssh2/ttxssh/ttxssh.dll
            build-${{ matrix.arch }}/tests/unit/ttunittest.exe

  test-x86:
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: spike-x86
      - name: Run ttunittest.exe (x86 under WOW64)
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Recurse -Filter ttunittest.exe | Select-Object -First 1
          if (-not $exe) { throw "ttunittest.exe (x86) not found" }
          & $exe.FullName
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

  test-arm64:
    needs: build
    runs-on: windows-11-arm
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: spike-aarch64
      - name: Run ttunittest.exe (native ARM64)
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Recurse -Filter ttunittest.exe | Select-Object -First 1
          if (-not $exe) { throw "ttunittest.exe (arm64) not found" }
          & $exe.FullName
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
