name: Release (putup)

# Produce the shipped Tera Term release artifacts from the putup (clang-cl + xwin)
# build. Tag-triggered; workflow_dispatch for dry runs while this is built out.
#
# Being assembled incrementally:
#   [1] stage-linux   -- DONE: putup build x86/x64/arm64 -> flat payload + _pdb.
#   [2] package-win   -- DONE: CHM (hhc) + cygterm (Cygwin gcc) + ISCC installers.
#   [3] differential  -- DONE: pe_diff.py diff-tree putup vs the msbuild reference.
#   [4] publish       -- DONE: gh release create.
#
# NOTE: the build steps below duplicate .github/workflows/putup.yml; once the
# Windows packaging is proven they should be extracted into a reusable
# (workflow_call) workflow that both this and putup.yml invoke.

on:
  push:
    tags:
      - 'v*'
  # Exercise the release path on PRs that touch it (the Windows packaging jobs,
  # added later, will gate themselves to non-PR events to keep PR cost down).
  pull_request:
    paths:
      - '.github/workflows/putup-release.yml'
      - 'ci_scripts/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  stage-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - { name: x86_64, xwin: x86_64,  config: xwin.config,      dir: build-win }
          - { name: x86,    xwin: x86,     config: win32-x86.config, dir: build-win32 }
          - { name: arm64,  xwin: aarch64, config: arm64.config,     dir: build-arm64 }
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM toolchain (clang-cl, lld-link, llvm-lib, llvm-rc)
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld llvm
          for t in clang-cl lld-link llvm-lib llvm-rc; do
            sudo ln -sf "$(ls /usr/bin/$t-* | sort -V | tail -1)" /usr/local/bin/$t
          done

      - name: Install putup
        run: |
          curl -fsSL https://raw.githubusercontent.com/typeless/putup/main/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Cache xwin splat
        id: cache-xwin
        uses: actions/cache@v4
        with:
          path: ~/.xwin/splat
          key: xwin-splat-0.9.0-${{ matrix.arch.xwin }}

      - name: Fetch MSVC CRT + Windows SDK (xwin)
        if: steps.cache-xwin.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://github.com/Jake-Shadle/xwin/releases/download/0.9.0/xwin-0.9.0-x86_64-unknown-linux-musl.tar.gz | tar -xz
          ./xwin-*/xwin --accept-license --arch ${{ matrix.arch.xwin }} splat --output "$HOME/.xwin/splat"

      - name: Cache vendored third-party sources
        id: cache-libs
        uses: actions/cache@v4
        with:
          path: |
            libs/oniguruma
            libs/SFMT
            libs/zlib
            libs/libressl
            libs/argon2
            libs/cJSON
          key: vendor-libs-${{ hashFiles('.github/workflows/putup.yml') }}

      - name: Restore tracked libs files after cache
        run: git checkout -- libs

      - name: Vendor third-party sources
        if: steps.cache-libs.outputs.cache-hit != 'true'
        run: |
          set -eux
          tmp="$(mktemp -d)"
          get() { curl -fsSL "$1" -o "$tmp/$2"; }
          merge() { mkdir -p "libs/$2" && cp -a "$tmp/$1/." "libs/$2/"; }
          get https://github.com/kkos/oniguruma/releases/download/v6.9.10/onig-6.9.10.tar.gz onig.tgz
          tar -xzf "$tmp/onig.tgz" -C "$tmp"; merge onig-6.9.10 oniguruma
          get https://github.com/MersenneTwister-Lab/SFMT/archive/refs/tags/1.5.1.tar.gz sfmt.tgz
          tar -xzf "$tmp/sfmt.tgz" -C "$tmp"; merge SFMT-1.5.1 SFMT
          get https://github.com/madler/zlib/archive/refs/tags/v1.3.2.tar.gz zlib.tgz
          tar -xzf "$tmp/zlib.tgz" -C "$tmp"; merge zlib-1.3.2 zlib
          get https://github.com/libressl/portable/releases/download/v4.2.1/libressl-4.2.1.tar.gz libressl.tgz
          tar -xzf "$tmp/libressl.tgz" -C "$tmp"; merge libressl-4.2.1 libressl
          get https://github.com/P-H-C/phc-winner-argon2/archive/refs/tags/20190702.tar.gz argon2.tgz
          tar -xzf "$tmp/argon2.tgz" -C "$tmp"; merge phc-winner-argon2-20190702 argon2
          get https://github.com/DaveGamble/cJSON/archive/v1.7.14.zip cjson.zip
          unzip -q "$tmp/cjson.zip" -d "$tmp"; merge cJSON-1.7.14 cJSON
          rm -rf "$tmp"

      - name: Verify vendored dependency hashes
        run: |
          set -eu
          pin() { printf '%s  libs/%s\n' "$2" "$1" | sha256sum -c -; }
          pin oniguruma/HISTORY   bdf00b251fa9dfb2aea3e1c007a0994bd40203a56706402c7cebb976c41d0cae
          pin SFMT/CHANGE-LOG.txt ac65302c740579c7dccc99b2fcd735af3027957680f2ce227042755646abb1db
          pin zlib/ChangeLog      c6f42df0f27486db922d633e7a70757b56c6cd9f742f21af419d232649efbede
          pin libressl/ChangeLog  f99c885d5318dc6357b4bb3563c0fb7ea536ff1734c67a436aa2532ebb4b5bd7
          pin argon2/CHANGELOG.md 1b513eb6524f0a3ac5e182bf2713618ddd8f2616ebe6e090d647c49b3e7eb2ec
          pin cJSON/CHANGELOG.md  4ff95e0060ea2dbc13720079399e77d404d89e514b569fcc8d741f3272c98e53

      - name: Build
        run: |
          export XWIN_SPLAT="$HOME/.xwin/splat"
          putup configure --config configs/${{ matrix.arch.config }} -B ${{ matrix.arch.dir }}
          putup -B ${{ matrix.arch.dir }} || putup -B ${{ matrix.arch.dir }}

      - name: Stage flat payload + PDBs
        run: |
          sh ci_scripts/check_release_manifest.sh ${{ matrix.arch.dir }}
          sh ci_scripts/stage_release.sh ${{ matrix.arch.dir }} teraterm-${{ matrix.arch.name }}

      - name: Upload staged payload
        uses: actions/upload-artifact@v4
        with:
          name: staged-${{ matrix.arch.name }}
          path: |
            teraterm-${{ matrix.arch.name }}/
            teraterm-${{ matrix.arch.name }}_pdb/

  # [2a] Build the two CHM help files on Windows (hhc is Windows-only). Arch-
  # independent -- one set is shared by all three installers. Standalone (no
  # dependency on stage-linux) so it verifies on its own.
  chm:
    runs-on: windows-2022
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Probe CHM toolchain
        shell: cmd
        run: |
          echo --- perl --- & where perl
          echo --- cmake --- & where cmake
          if exist "%ProgramFiles(x86)%\HTML Help Workshop\hhc.exe" (echo hhc: FOUND ^(x86^)) else if exist "%ProgramFiles%\HTML Help Workshop\hhc.exe" (echo hhc: FOUND) else (echo hhc: MISSING)
          exit /b 0

      - name: Vendor third-party sources (convtext transcodes libs/*/COPYING)
        shell: bash
        run: |
          set -eux
          tmp="$(mktemp -d)"
          get() { curl -fsSL "$1" -o "$tmp/$2"; }
          merge() { mkdir -p "libs/$2" && cp -a "$tmp/$1/." "libs/$2/"; }
          get https://github.com/kkos/oniguruma/releases/download/v6.9.10/onig-6.9.10.tar.gz onig.tgz
          tar -xzf "$tmp/onig.tgz" -C "$tmp"; merge onig-6.9.10 oniguruma
          get https://github.com/MersenneTwister-Lab/SFMT/archive/refs/tags/1.5.1.tar.gz sfmt.tgz
          tar -xzf "$tmp/sfmt.tgz" -C "$tmp"; merge SFMT-1.5.1 SFMT
          get https://github.com/madler/zlib/archive/refs/tags/v1.3.2.tar.gz zlib.tgz
          tar -xzf "$tmp/zlib.tgz" -C "$tmp"; merge zlib-1.3.2 zlib
          get https://github.com/libressl/portable/releases/download/v4.2.1/libressl-4.2.1.tar.gz libressl.tgz
          tar -xzf "$tmp/libressl.tgz" -C "$tmp"; merge libressl-4.2.1 libressl
          get https://github.com/P-H-C/phc-winner-argon2/archive/refs/tags/20190702.tar.gz argon2.tgz
          tar -xzf "$tmp/argon2.tgz" -C "$tmp"; merge phc-winner-argon2-20190702 argon2
          get https://github.com/DaveGamble/cJSON/archive/v1.7.14.zip cjson.zip
          unzip -q "$tmp/cjson.zip" -d "$tmp"; merge cJSON-1.7.14 cJSON
          rm -rf "$tmp"

      - name: Install SBAppLocale (locale shim makechm wraps hhc with)
        shell: cmd
        working-directory: buildtools
        run: install_sbapplocale.bat

      - name: Build CHM (teraterm.chm + teratermj.chm)
        shell: cmd
        working-directory: doc
        run: makechm.bat

      - name: Upload CHM
        uses: actions/upload-artifact@v4
        with:
          name: chm
          path: |
            doc/en/teraterm.chm
            doc/ja/teratermj.chm

  # [2b] Build the Cygwin companion (cygterm.exe + cygterm+.tar.gz) with the
  # Cygwin gcc toolchain -- putup/clang-cl cannot produce it. One x86_64 build is
  # shared across all three installers. Standalone.
  cygterm:
    runs-on: windows-2022
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Install Cygwin (gcc-g++, make, tar) to buildtools
        shell: cmd
        working-directory: buildtools
        run: install_cygwin.bat

      - name: Build cygterm.exe + cygterm+.tar.gz
        shell: cmd
        run: |
          set PATH=%CD%\buildtools\cygwin64\bin;%PATH%
          cd cygwin\cygterm
          make cygterm+-x86_64 -j || exit /b 1
          make archive || exit /b 1
          dir cygterm+-x86_64\cygterm.exe cygterm+.tar.gz

      - name: Upload cygterm
        uses: actions/upload-artifact@v4
        with:
          name: cygterm
          path: |
            cygwin/cygterm/cygterm+-x86_64/cygterm.exe
            cygwin/cygterm/cygterm.cfg
            cygwin/cygterm/cygterm+.tar.gz

  # [2c] Integration on Windows: inject the CHM + cygterm into each staged
  # payload, generate the installer version metadata, and run ISCC to produce the
  # three installers. (Portable/pdb zips + checksums follow in a later step.)
  package:
    runs-on: windows-2022
    needs: [stage-linux, chm, cygterm]
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Install Inno Setup to buildtools
        shell: cmd
        working-directory: buildtools
        run: install_innosetup.bat

      - name: Download staged payloads
        uses: actions/download-artifact@v4
        with:
          pattern: staged-*
          merge-multiple: true

      - name: Download CHM
        uses: actions/download-artifact@v4
        with: { name: chm, path: chm-dl }

      - name: Download cygterm
        uses: actions/download-artifact@v4
        with: { name: cygterm, path: cygterm-dl }

      - name: Show downloaded layout
        shell: cmd
        run: |
          echo --- staged trees --- & dir /b teraterm-*
          echo --- chm-dl --- & dir /s /b chm-dl
          echo --- cygterm-dl --- & dir /s /b cygterm-dl

      - name: Generate installer version (build_config.isl)
        shell: cmd
        run: perl buildtools\svnrev\svnrev.pl --root . --isl installer\build_config.isl

      - name: Inject CHM + cygterm and run ISCC per arch
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $iscc = (Resolve-Path "buildtools\innosetup6\ISCC.exe").Path
          $chmE = (Get-ChildItem -Recurse chm-dl     -Filter "teraterm.chm").FullName
          $chmJ = (Get-ChildItem -Recurse chm-dl     -Filter "teratermj.chm").FullName
          $cygX = (Get-ChildItem -Recurse cygterm-dl -Filter "cygterm.exe").FullName
          $cygC = (Get-ChildItem -Recurse cygterm-dl -Filter "cygterm.cfg").FullName
          $cygT = (Get-ChildItem -Recurse cygterm-dl -Filter "cygterm+.tar.gz").FullName
          $out  = (New-Item -ItemType Directory -Force -Path "dist").FullName
          $map  = @{ "x86_64" = "x64"; "x86" = "x86"; "arm64" = "arm64" }
          foreach ($a in "x86_64", "x86", "arm64") {
            $dst = "teraterm-$a"
            Copy-Item $chmE, $chmJ, $cygX, $cygC, $cygT $dst
            $src = (Resolve-Path $dst).Path
            & $iscc "/DSrcDir=$src" "/DArch=$($map[$a])" "/O$out" "installer\teraterm.iss"
            if ($LASTEXITCODE -ne 0) { throw "ISCC failed for $a (exit $LASTEXITCODE)" }
          }
          Get-ChildItem $out

      - name: Portable + PDB zips and checksums
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $out = (Resolve-Path "dist").Path
          $map = @{ "x86_64" = "x64"; "x86" = "x86"; "arm64" = "arm64" }
          foreach ($a in "x86_64", "x86", "arm64") {
            $arch = $map[$a]
            $exe = Get-ChildItem $out -Filter "*-$arch-*.exe" | Select-Object -First 1
            if (-not $exe) { $exe = Get-ChildItem $out -Filter "*-$arch.exe" | Select-Object -First 1 }
            $base = $exe.BaseName
            # Zip payloads under their versioned top-level dir name (as create_package does).
            cmake -E copy_directory "teraterm-$a" "$out\$base"
            cmake -E copy_directory "teraterm-${a}_pdb" "$out\${base}_pdb"
            Push-Location $out
            cmake -E tar cf "$base.zip" --format=zip -- "$base"
            cmake -E tar cf "${base}_pdb.zip" --format=zip -- "${base}_pdb"
            cmake -E rm -rf "$base" "${base}_pdb"
            cmake -E sha256sum "$base.exe" "$base.zip" "${base}_pdb.zip" | Out-File -Encoding ascii "$base.sha256sum"
            cmake -E sha512sum "$base.exe" "$base.zip" "${base}_pdb.zip" | Out-File -Encoding ascii "$base.sha512sum"
            Pop-Location
          }
          Get-ChildItem $out

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release
          path: |
            dist/*.exe
            dist/*.zip
            dist/*.sha256sum
            dist/*.sha512sum

  # [3] Transitional differential gate (tag / dispatch only -- a PR has no MSVC
  # reference, so it self-skips). Waits for the msbuild.yml run of the SAME commit,
  # then diffs every putup (clang-cl) PE against its MSVC twin with pe_diff.py. A
  # green run is the signal that LICENSES the Phase-5 deletion of the CMake /
  # vcxproj / MSVC build. It does not gate `publish`: the release ships regardless,
  # and a structural difference merely turns the run red for investigation. Runs on
  # Linux -- only PRODUCING the MSVC reference needs Windows; parsing PE does not.
  differential:
    runs-on: ubuntu-latest
    needs: [stage-linux]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Install pefile
        run: python3 -m pip install --break-system-packages --quiet pefile

      - name: Download putup staged payloads
        uses: actions/download-artifact@v4
        with:
          pattern: staged-*
          merge-multiple: true

      - name: Fetch the MSVC reference (msbuild.yml, same commit)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -eu
          # Both workflows fire on the same tag; find msbuild's run for this commit.
          # stage-linux (this job's dependency) takes minutes, so the run is already
          # registered by now -- the short retry only covers rare registration lag.
          run_id=""
          for i in $(seq 1 6); do
            run_id=$(gh run list --workflow=msbuild.yml --commit="$SHA" --repo "$REPO" \
                       --json databaseId --jq '.[0].databaseId // empty' || true)
            [ -n "$run_id" ] && break
            echo "msbuild run for $SHA not found yet (attempt $i); waiting 20s..."
            sleep 20
          done
          if [ -z "$run_id" ]; then
            # A v* tag co-triggers msbuild.yml, so on a tag its absence is a real
            # failure. A lone workflow_dispatch does NOT trigger msbuild -- there is
            # no MSVC reference to diff against, so skip (mirrors the PR self-skip).
            case "${GITHUB_REF:-}" in
              refs/tags/*) echo "::error::no msbuild.yml run for tag $SHA -- the MSVC reference must co-trigger"; exit 1 ;;
              *) echo "::warning::no msbuild.yml reference for $SHA (lone dispatch) -- skipping the differential gate"; exit 0 ;;
            esac
          fi
          echo "msbuild reference run: $run_id"

          # Block until msbuild finishes (it starts with us but runs longer). Cap the
          # wait so a stuck reference run fails here rather than billing to the 6h job
          # limit; msbuild's 3-arch worst case is well under 90 min.
          status=""
          for i in $(seq 1 180); do
            status=$(gh run view "$run_id" --repo "$REPO" --json status --jq '.status')
            echo "msbuild run $run_id: $status"
            [ "$status" = "completed" ] && break
            sleep 30
          done
          [ "$status" = "completed" ] || { echo "::error::msbuild run $run_id did not finish within the wait cap"; exit 1; }
          echo "msbuild conclusion: $(gh run view "$run_id" --repo "$REPO" --json conclusion --jq '.conclusion')"

          # Pull each per-arch portable zip (the payload, not the *_pdb.zip) and
          # unpack it. pe_diff walks recursively, so the inner dir name is irrelevant.
          for msarch in x86 x64 arm64; do
            if ! gh run download "$run_id" --repo "$REPO" \
                   --pattern "BUILD-*-VS2022-${msarch}-zip" --dir "ref-$msarch"; then
              echo "::error::no msbuild $msarch zip on run $run_id (did the MSVC $msarch build fail?)"
              exit 1
            fi
            zip=$(find "ref-$msarch" -name '*.zip' ! -name '*_pdb.zip' | head -1)
            [ -n "$zip" ] || { echo "::error::no portable zip inside the $msarch reference artifact"; exit 1; }
            unzip -q "$zip" -d "ref-$msarch/tree"
          done

      - name: Structural differential (putup clang-cl vs MSVC, per arch)
        run: |
          set -eu
          rc=0
          # <putup staged dir suffix>:<msbuild arch token>
          for pair in "x86_64:x64" "x86:x86" "arm64:arm64"; do
            putup="teraterm-${pair%%:*}"
            msarch="${pair##*:}"
            echo "::group::diff $putup  vs  msbuild $msarch"
            python3 ci_scripts/pe_diff.py diff-tree "$putup" "ref-$msarch/tree" || rc=1
            echo "::endgroup::"
          done
          exit $rc

  # [4] Publish the GitHub Release (tag pushes only -- dispatch / PR have no tag to
  # release, so this self-skips). Attaches the installers, portable + PDB zips, and
  # checksums that `package` built. Independent of `differential`.
  publish:
    runs-on: ubuntu-latest
    needs: [package]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release
          path: dist

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -eu
          # Idempotent: a job re-run (or tag re-push) after the release already
          # exists (re)attaches the assets instead of failing on "already exists".
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "release $TAG already exists -- (re)uploading assets with --clobber"
            gh release upload "$TAG" --repo "$REPO" --clobber \
              dist/*.exe dist/*.zip dist/*.sha256sum dist/*.sha512sum
          else
            gh release create "$TAG" --repo "$REPO" \
              --title "Tera Term $TAG" --prerelease --generate-notes \
              dist/*.exe dist/*.zip dist/*.sha256sum dist/*.sha512sum
          fi
