name: Build (putup / clang-cl + xwin)

# Cross-compile the whole Tera Term distribution for Windows x86_64 (MSVC ABI)
# from Linux with clang-cl + lld-link against an xwin-splatted MSVC SDK/CRT,
# driven by putup. No Windows runner or Visual Studio needed.

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Fast pre-merge signal: pure/protocol unit tests built with the system
  # compiler under ASan/UBSan. No cross toolchain, so it finishes in ~1 min and
  # gates every push independently of the (slower) Windows cross-build below.
  unit-tests-host:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check sealed core TUs stay decoupled from ts/cv
        run: sh ci_scripts/check_sealed_tus.sh
      - name: Run host unit tests (ASan/UBSan)
        run: make -C tests/unit check

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM toolchain (clang-cl, lld-link, llvm-lib, llvm-rc)
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld llvm
          for t in clang-cl lld-link llvm-lib llvm-rc; do
            sudo ln -sf "$(ls /usr/bin/$t-* | sort -V | tail -1)" /usr/local/bin/$t
          done

      - name: Install putup
        run: |
          curl -fsSL https://raw.githubusercontent.com/typeless/putup/main/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # The splatted MSVC SDK/CRT is ~630 MB and identical across runs for a
      # fixed xwin version + arch; caching it removes the dominant cold cost.
      - name: Cache xwin splat
        id: cache-xwin
        uses: actions/cache@v4
        with:
          path: ~/.xwin/splat
          key: xwin-splat-0.9.0-x86_64

      - name: Fetch MSVC CRT + Windows SDK (xwin)
        if: steps.cache-xwin.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://github.com/Jake-Shadle/xwin/releases/download/0.9.0/xwin-0.9.0-x86_64-unknown-linux-musl.tar.gz | tar -xz
          ./xwin-*/xwin --accept-license --arch x86_64 splat --output "$HOME/.xwin/splat"

      # Third-party sources are pinned by version in this file, so key the cache
      # on its hash; a version bump here invalidates the cache automatically.
      - name: Cache vendored third-party sources
        id: cache-libs
        uses: actions/cache@v4
        with:
          path: |
            libs/oniguruma
            libs/SFMT
            libs/zlib
            libs/libressl
            libs/argon2
            libs/cJSON
          key: vendor-libs-${{ hashFiles('.github/workflows/putup.yml') }}

      # The cached libs/ dirs also contain tracked build files (Tupfiles, headers).
      # A restore overwrites the freshly checked-out copies with the snapshot from
      # when the cache was saved, and the key only hashes putup.yml — so an edit to
      # a tracked libs/ file would otherwise be silently reverted. Restore them from
      # HEAD; untracked cached upstream sources are left in place.
      - name: Restore tracked libs files after cache
        run: git checkout -- libs

      - name: Vendor third-party sources
        if: steps.cache-libs.outputs.cache-hit != 'true'
        run: |
          set -eux
          tmp="$(mktemp -d)"
          get() { curl -fsSL "$1" -o "$tmp/$2"; }
          merge() { mkdir -p "libs/$2" && cp -a "$tmp/$1/." "libs/$2/"; }

          get https://github.com/kkos/oniguruma/releases/download/v6.9.10/onig-6.9.10.tar.gz onig.tgz
          tar -xzf "$tmp/onig.tgz" -C "$tmp"; merge onig-6.9.10 oniguruma

          # SFMT from the official GitHub mirror; the hiroshima-u academic server
          # returns HTTP 415 to CI runners.
          get https://github.com/MersenneTwister-Lab/SFMT/archive/refs/tags/1.5.1.tar.gz sfmt.tgz
          tar -xzf "$tmp/sfmt.tgz" -C "$tmp"; merge SFMT-1.5.1 SFMT

          # zlib + LibreSSL from GitHub too; zlib.net / openbsd ftp return HTTP 415
          # to CI runners. The LibreSSL release asset is the same distribution
          # tarball as the openbsd ftp one.
          get https://github.com/madler/zlib/archive/refs/tags/v1.3.2.tar.gz zlib.tgz
          tar -xzf "$tmp/zlib.tgz" -C "$tmp"; merge zlib-1.3.2 zlib

          get https://github.com/libressl/portable/releases/download/v4.2.1/libressl-4.2.1.tar.gz libressl.tgz
          tar -xzf "$tmp/libressl.tgz" -C "$tmp"; merge libressl-4.2.1 libressl

          get https://github.com/P-H-C/phc-winner-argon2/archive/refs/tags/20190702.tar.gz argon2.tgz
          tar -xzf "$tmp/argon2.tgz" -C "$tmp"; merge phc-winner-argon2-20190702 argon2

          get https://github.com/DaveGamble/cJSON/archive/v1.7.14.zip cjson.zip
          unzip -q "$tmp/cjson.zip" -d "$tmp"; merge cJSON-1.7.14 cJSON

          rm -rf "$tmp"

      # Supply-chain pin: the vendor step fetches version-tagged URLs but does not
      # hash-verify. Pin each dependency by the SHA-256 of a content file inside it
      # (the same CHECK_FILE hashes libs/download.cmake uses) -- these are
      # URL-independent, so they hold whether the source came from the vendor step
      # or the restored cache. Fail closed on any mismatch.
      - name: Verify vendored dependency hashes
        run: |
          set -eu
          pin() { printf '%s  libs/%s\n' "$2" "$1" | sha256sum -c -; }
          pin oniguruma/HISTORY   bdf00b251fa9dfb2aea3e1c007a0994bd40203a56706402c7cebb976c41d0cae
          pin SFMT/CHANGE-LOG.txt ac65302c740579c7dccc99b2fcd735af3027957680f2ce227042755646abb1db
          pin zlib/ChangeLog      c6f42df0f27486db922d633e7a70757b56c6cd9f742f21af419d232649efbede
          pin libressl/ChangeLog  f99c885d5318dc6357b4bb3563c0fb7ea536ff1734c67a436aa2532ebb4b5bd7
          pin argon2/CHANGELOG.md 1b513eb6524f0a3ac5e182bf2713618ddd8f2616ebe6e090d647c49b3e7eb2ec
          pin cJSON/CHANGELOG.md  4ff95e0060ea2dbc13720079399e77d404d89e514b569fcc8d741f3272c98e53

      - name: Build
        run: |
          export XWIN_SPLAT="$HOME/.xwin/splat"
          putup configure --config configs/xwin.config -B build-win
          # putup 0.1.0 does not always order $(S)-path lib deps on a cold build;
          # a second pass converges (a no-op once everything is up to date).
          putup -B build-win || putup -B build-win

      - name: Verify build output
        run: |
          exe="$(find build-win -name '*.exe' | wc -l)"
          dll="$(find build-win -name '*.dll' | wc -l)"
          echo "built ${exe} exe + ${dll} dll"
          find build-win \( -name '*.exe' -o -name '*.dll' \) | sort
          test "$exe" -ge 8
          test "$dll" -ge 20
          file build-win/teraterm/teraterm/ttermpro.exe | grep -q 'PE32+'
          file build-win/ttssh2/ttxssh/ttxssh.dll | grep -q 'PE32+'

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: teraterm-windows-x86_64
          path: |
            build-win/**/*.exe
            build-win/**/*.dll

  # Run the Catch2 unit tests on real Windows against the cross-built binary,
  # including the [win]-tagged cases that exercise the genuine Win32 codepage
  # conversions (stubbed on the Linux host lane). This is the "test on native
  # Windows" gate; the build itself stays clang-cl+xwin on Linux.
  test-windows:
    runs-on: windows-latest
    needs: build
    steps:
      - name: Download cross-built binaries
        uses: actions/download-artifact@v4
        with:
          name: teraterm-windows-x86_64
      - name: Run unit tests (native Windows)
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Recurse -Filter ttunittest.exe | Select-Object -First 1
          if (-not $exe) { throw "ttunittest.exe not found in the artifact" }
          & $exe.FullName
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
